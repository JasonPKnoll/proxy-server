# Iori reverse proxy — single Nginx entry point for all apps.
#
# To add a new app:
#   1. Add a location block below for its static web root, with try_files
#      falling back to that app's own index.html (needed for SvelteKit
#      client-side routing).
#   2. If it has a Go API backend, add a location block proxying
#      /api/[app-name]/ to localhost:[port]. Never expose the port directly.
#   3. Assign the next port in sequence (see iori-proxy CLAUDE.md port map,
#      currently continuing from 30002).
#   4. Create the web root at /var/www/[app-name] and deploy the static build.
#   5. Add a systemd service file for the API (see systemd/ in this repo).

server {
    listen 80;
    server_name iori;

    access_log /var/log/nginx/iori.access.log;
    error_log /var/log/nginx/iori.error.log;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location /api/jp-drill/ {
        proxy_pass http://localhost:30000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/song-drill/ {
        proxy_pass http://localhost:30001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /jp-drill/ {
        alias /var/www/jp-drill/;
        try_files $uri $uri/ /jp-drill/index.html;
    }

    location /song-drill/ {
        alias /var/www/song-drill/;
        try_files $uri $uri/ /song-drill/index.html;
    }

    location / {
        root /var/www/dashboard;
        try_files $uri $uri/ /index.html;
    }
}
